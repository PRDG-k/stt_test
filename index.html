<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>음성 제어 에이전트 MVP</title>
</head>
<body>
    <button id="recordBtn">녹음 시작</button>
    <p id="status">대기 중...</p>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const statusStr = document.getElementById('status');

        recordBtn.onclick = async () => {
            if (recordBtn.textContent === '녹음 시작') {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    
                    mediaRecorder.ondataavailable = e => {
                        audioChunks.push(e.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const formData = new FormData();
                        formData.append('file', audioBlob, 'record.webm');
                        
                        statusStr.textContent = '서버 처리 중...';
                        
                        const response = await fetch('/upload-audio/', {
                            method: 'POST',
                            body: formData
                        });
                        const result = await response.json();
                        statusStr.textContent = result.message;
                        audioChunks = [];
                    };
                    
                    mediaRecorder.start();
                    recordBtn.textContent = '녹음 중지';
                    statusStr.textContent = '녹음 활성화됨 (녹음 중...)';
                } catch (err) {
                    statusStr.textContent = '마이크 접근 권한이 필요합니다.';
                }
            } else {
                mediaRecorder.stop();
                recordBtn.textContent = '녹음 시작';
            }
        };
    </script>
</body>
</html>
